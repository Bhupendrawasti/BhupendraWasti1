<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title> License PDF → JSON Extractor (with Page Range)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    body { font-family: Arial; background: #f5f5f5; padding: 20px; }
    .box { max-width: 1200px; margin: auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,.1); }
    textarea { width: 100%; height: 350px; margin-top: 10px; padding: 10px; font-family: monospace; font-size: 11px; }
    button { margin: 5px; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .green { background: #4CAF50; color: #fff; }
    .blue { background: #2196F3; color: #fff; }
    .red { background: #f44336; color: #fff; }
    .orange { background: #ff9800; color: #fff; }
    .purple { background: #9c27b0; color: #fff; }
    .teal { background: #009688; color: #fff; }
    .progress { width: 100%; background: #e0e0e0; border-radius: 5px; margin: 10px 0; display: none; }
    .progress-bar { width: 0%; height: 25px; background: #4CAF50; border-radius: 5px; text-align: center; color: white; line-height: 25px; }
    .stats { margin-top: 10px; padding: 10px; background: #e3f2fd; border-radius: 8px; font-size: 14px; }
    .range-box { background: #f0f0f0; padding: 15px; border-radius: 8px; margin: 10px 0; }
    .range-box input { padding: 8px; margin: 0 10px; width: 80px; text-align: center; font-size: 14px; }
    .range-box label { font-weight: bold; margin: 0 5px; }
    .preset-buttons { margin: 10px 0; }
    .preset-buttons button { padding: 5px 12px; font-size: 12px; margin: 2px; }
    .info { background: #fff3e0; padding: 10px; border-radius: 8px; margin: 10px 0; font-size: 13px; }
    .warning { color: #f44336; font-size: 12px; }
    .success { color: #4CAF50; }
    .flex { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  </style>
</head>
<body>

<div class="box">
  <h2>📄  License PDF → JSON Extractor</h2>
  <p>Extract license holder data from PDF with page range selection</p>

  <input type="file" id="fileInput" accept="application/pdf"><br><br>

  <div class="range-box">
    <div class="flex">
      <div>
        <label>📄 Page Range:</label>
        <input type="number" id="startPage" placeholder="Start" value="1" min="1">
        <label>to</label>
        <input type="number" id="endPage" placeholder="End" value="10" min="1">
      </div>
      <div>
        <button class="teal" onclick="setRangePreset('1-10')">1-10</button>
        <button class="teal" onclick="setRangePreset('11-20')">11-20</button>
        <button class="teal" onclick="setRangePreset('21-30')">21-30</button>
        <button class="teal" onclick="setRangePreset('31-40')">31-40</button>
        <button class="teal" onclick="setRangePreset('41-50')">41-50</button>
        <button class="teal" onclick="setRangePreset('1-100')">1-100</button>
        <button class="teal" onclick="setRangePreset('1-500')">1-500</button>
        <button class="teal" onclick="setRangePreset('all')">All Pages</button>
      </div>
    </div>
    <div class="preset-buttons">
      <button class="orange" onclick="setRangePreset('100-200')">100-200</button>
      <button class="orange" onclick="setRangePreset('200-300')">200-300</button>
      <button class="orange" onclick="setRangePreset('300-400')">300-400</button>
      <button class="orange" onclick="setRangePreset('400-500')">400-500</button>
      <button class="orange" onclick="setRangePreset('500-526')">500-526</button>
    </div>
    <div class="info">
      ℹ️ <strong>Info:</strong> Total pages in file: <span id="totalPagesInfo">Unknown</span><br>
      💡 <strong>Tip:</strong> Extract in smaller batches (e.g., 1-100) for better performance and to check quality.
    </div>
  </div>

  <div class="flex">
    <button class="blue" onclick="processPDF()">🔍 Extract & Convert</button>
    <button class="green" onclick="downloadJSON()">💾 Download Full JSON</button>
    <button class="orange" onclick="downloadSample()">📋 Download Sample (First 100)</button>
    <button class="purple" onclick="downloadRange()">📑 Download Current Range</button>
    <button class="red" onclick="clearAll()">🗑️ Clear</button>
  </div>

  <div class="progress" id="progress">
    <div class="progress-bar" id="progress-bar">0%</div>
  </div>

  <textarea id="output" placeholder="JSON output will appear here..."></textarea>

  <div id="status" class="stats"></div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let finalData = [];
let currentRangeData = [];
let pdfDoc = null;
let totalPDFPages = 0;

// Patterns
const LIC_PATTERN = /\b(\d{2}-\d{2}-\d{7,})\b/;
const DATE_PATTERN = /\b(\d{4}-[A-Z]{3}-\d{2})\b/;

function setRangePreset(range) {
  if (range === 'all') {
    document.getElementById('startPage').value = 1;
    document.getElementById('endPage').value = totalPDFPages || 526;
  } else {
    const [start, end] = range.split('-').map(Number);
    document.getElementById('startPage').value = start;
    document.getElementById('endPage').value = end;
  }
}

async function loadPDFInfo() {
  const file = document.getElementById('fileInput').files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = async function() {
    const pdf = await pdfjsLib.getDocument(new Uint8Array(reader.result)).promise;
    totalPDFPages = pdf.numPages;
    document.getElementById('totalPagesInfo').innerHTML = totalPDFPages;
    document.getElementById('endPage').max = totalPDFPages;
    document.getElementById('startPage').max = totalPDFPages;
  };
  reader.readAsArrayBuffer(file);
}

document.getElementById('fileInput').addEventListener('change', loadPDFInfo);

function parseLine(line) {
  try {
    const licMatch = line.match(LIC_PATTERN);
    if (!licMatch) return null;
    const lic = licMatch[1];
    
    const dateMatch = line.match(DATE_PATTERN);
    const printeddate = dateMatch ? dateMatch[1] : '2026-FEB-06';
    
    let category = '';
    const licIndex = line.indexOf(lic);
    const afterLic = line.substring(licIndex + lic.length);
    const jhapaMatch = afterLic.match(/([A-Z][0-9]?(?:\s*,\s*[A-Z][0-9]?)*)\s+JHAPA/i);
    if (jhapaMatch) {
      category = jhapaMatch[1].trim();
    } else {
      const catMatch = afterLic.match(/[A-Z][0-9]?(?:\s*,\s*[A-Z][0-9]?)*/);
      if (catMatch) category = catMatch[0].trim();
    }
    
    let beforeLic = line.substring(0, licIndex);
    beforeLic = beforeLic.replace(/^\d+\s+/, '');
    beforeLic = beforeLic.replace(/^\d+\s*/, '');
    const holdername = beforeLic.trim();
    
    if (!holdername || holdername.length < 2) return null;
    
    return {
      lic: lic,
      holdername: holdername,
      category: category,
      office: "JHAPA",
      status: "printed",
      printeddate: printeddate
    };
  } catch (e) {
    return null;
  }
}

async function processPDF() {
  const file = document.getElementById('fileInput').files[0];
  if (!file) {
    alert('Please upload a PDF file first');
    return;
  }

  const startPage = parseInt(document.getElementById('startPage').value) || 1;
  let endPage = parseInt(document.getElementById('endPage').value) || 10;
  
  if (endPage > totalPDFPages && totalPDFPages > 0) {
    endPage = totalPDFPages;
  }

  const statusDiv = document.getElementById('status');
  const progressDiv = document.getElementById('progress');
  const progressBar = document.getElementById('progress-bar');
  
  currentRangeData = [];
  progressDiv.style.display = 'block';
  statusDiv.innerHTML = `📄 Loading PDF... (Pages ${startPage} to ${endPage})`;

  const reader = new FileReader();

  reader.onload = async function() {
    try {
      const pdf = await pdfjsLib.getDocument(new Uint8Array(reader.result)).promise;
      const pagesToProcess = endPage - startPage + 1;
      let processedPages = 0;
      let allRecords = [];

      for (let pageNum = startPage; pageNum <= endPage; pageNum++) {
        const percent = Math.round(((pageNum - startPage + 1) / pagesToProcess) * 100);
        progressBar.style.width = `${percent}%`;
        progressBar.innerHTML = `${percent}%`;
        statusDiv.innerHTML = `📖 Processing page ${pageNum}/${endPage}... (${allRecords.length} records found)`;

        const page = await pdf.getPage(pageNum);
        const textContent = await page.getTextContent();
        
        const rows = {};
        for (const item of textContent.items) {
          const y = Math.round(item.transform[5]);
          if (!rows[y]) rows[y] = [];
          rows[y].push(item.str);
        }
        
        const yPositions = Object.keys(rows).sort((a, b) => b - a);
        
        for (const y of yPositions) {
          let line = rows[y].join(' ');
          if (line.toLowerCase().includes('license holder name') || 
              line.toLowerCase().includes('s.n.') ||
              line.toLowerCase().includes('license number') ||
              line.length < 20) {
            continue;
          }
          
          const record = parseLine(line);
          if (record && record.lic && record.holdername) {
            allRecords.push(record);
          }
        }
        
        processedPages++;
      }
      
      // Remove duplicates
      const uniqueData = [];
      const seenLic = new Set();
      for (const record of allRecords) {
        if (!seenLic.has(record.lic)) {
          seenLic.add(record.lic);
          uniqueData.push(record);
        }
      }
      
      currentRangeData = uniqueData;
      finalData = currentRangeData;
      
      document.getElementById('output').value = JSON.stringify(currentRangeData, null, 2);
      
      statusDiv.innerHTML = `
        ✅ <strong>Extraction Complete!</strong><br>
        📊 Pages processed: ${startPage} to ${endPage} (${processedPages} pages)<br>
        📝 Records extracted: ${currentRangeData.length}<br>
        🔑 Sample licenses: ${currentRangeData.slice(0, 3).map(r => r.lic).join(', ')}<br>
        👤 Sample names: ${currentRangeData.slice(0, 3).map(r => r.holdername).join(', ')}
      `;
      
      progressBar.style.width = '100%';
      progressBar.innerHTML = 'Complete!';
      
      setTimeout(() => {
        progressDiv.style.display = 'none';
      }, 2000);
      
    } catch (error) {
      console.error(error);
      statusDiv.innerHTML = `❌ Error: ${error.message}`;
      progressDiv.style.display = 'none';
    }
  };
  
  reader.readAsArrayBuffer(file);
}

function downloadJSON() {
  if (!finalData.length) {
    alert('No data to download. Process a PDF first.');
    return;
  }
  
  const blob = new Blob([JSON.stringify(finalData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `licenses_all_${finalData.length}_records.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function downloadSample() {
  if (!finalData.length) {
    alert('No data to download. Process a PDF first.');
    return;
  }
  
  const sample = finalData.slice(0, 100);
  const blob = new Blob([JSON.stringify(sample, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `licenses_sample_100.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function downloadRange() {
  if (!currentRangeData.length) {
    alert('No data from current range. Extract a range first.');
    return;
  }
  
  const startPage = document.getElementById('startPage').value;
  const endPage = document.getElementById('endPage').value;
  const blob = new Blob([JSON.stringify(currentRangeData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `licenses_pages_${startPage}_to_${endPage}_${currentRangeData.length}_records.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function clearAll() {
  document.getElementById('output').value = '';
  document.getElementById('status').innerHTML = '';
  document.getElementById('progress').style.display = 'none';
  finalData = [];
  currentRangeData = [];
}
</script>
</body>
</html>
