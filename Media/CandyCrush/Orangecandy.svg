<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Rich Orange Gradient for 3D effect -->
    <radialGradient id="orangeGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFCC80"/>
      <stop offset="30%" stop-color="#FFB347"/>
      <stop offset="70%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#B35900"/>
    </radialGradient>
    
    <!-- Smooth Glossy Shine -->
    <radialGradient id="gloss" cx="30%" cy="30%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Organic Oval Body (slightly irregular like Candy Crush) -->
  <path d="M100,15 
           C140,15 165,50 165,100 
           C165,150 145,185 100,185 
           C55,185 35,150 35,100 
           C35,50 60,15 100,15 Z" 
        fill="url(#orangeGrad)" 
        stroke="#CC5500" 
        stroke-width="2" />

  <!-- Top Glossy Reflection -->
  <ellipse cx="80" cy="60" rx="30" ry="18" 
           fill="url(#gloss)" 
           transform="rotate(-20, 80, 60)" />
  
  <!-- Specular Sparkle -->
  <circle cx="120" cy="50" r="4" fill="white" fill-opacity="0.9" />
  <circle cx="123" cy="53" r="2" fill="white" fill-opacity="0.6" />
</svg>