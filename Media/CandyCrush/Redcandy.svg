<svg width="200" height="200" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Simple radial gradient: bright candy red (top-left) to darker crimson (bottom-right) -->
    <radialGradient id="candyRedGrad" cx="35%" cy="35%" r="70%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#FF3333" />
      <stop offset="70%" stop-color="#CC0000" />
      <stop offset="100%" stop-color="#990000" />
    </radialGradient>

    <!-- Subtle soft shadow for depth -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="3" dy="5" stdDeviation="4" flood-color="#330000" flood-opacity="0.35" />
    </filter>
  </defs>

  <!-- Single Candy Bean Shape - Rotated -45° with no stripes -->
  <g transform="translate(250, 250) rotate(-45) translate(-250, -250)" filter="url(#shadow)">
    <!-- Main bean body -->
    <path d="M275.5,300.3 
             C260.3,259.9 274.7,210.5 308.9,184.4 
             C385.6,149.7 380.8,88.7 367.6,57.2 
             C356.8,31.6 322.5,-17.4 249.5,6.3 
             C193.9,23 145.3,61.9 114.2,111.7 
             C81.1,164.2 39.9,345 147.3,431 
             C178.8,456.3 276.5,486.4 316.9,418.6 
             C333.8,376.5 282.9,320.5 275.5,300.3z" 
          fill="url(#candyRedGrad)" 
          stroke="#660000" 
          stroke-width="2" />

    <!-- Soft glossy highlight -->
    <path d="M180,120 
             Q215,75 275,95 
             Q310,108 320,145 
             Q315,115 280,100 
             Q230,85 190,115 
             Z" 
          fill="white" 
          fill-opacity="0.35" />
  </g>
</svg>