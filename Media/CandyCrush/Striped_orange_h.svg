<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Rich Orange Gradient for 3D effect -->
    <radialGradient id="orangeGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFCC80"/>
      <stop offset="30%" stop-color="#FFB347"/>
      <stop offset="70%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#B35900"/>
    </radialGradient>
    
    <!-- Smooth Glossy Shine -->
    <radialGradient id="gloss" cx="30%" cy="30%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Candy clip path for stripes -->
    <clipPath id="candyClip">
      <path d="M100,15 C140,15 165,50 165,100 C165,150 145,185 100,185 C55,185 35,150 35,100 C35,50 60,15 100,15 Z"/>
    </clipPath>
  </defs>

  <!-- Candy Body -->
  <g>
    <!-- Main orange candy -->
    <path d="M100,15 
             C140,15 165,50 165,100 
             C165,150 145,185 100,185 
             C55,185 35,150 35,100 
             C35,50 60,15 100,15 Z" 
          fill="url(#orangeGrad)" 
          stroke="#CC5500" 
          stroke-width="2" />
    
    <!-- Horizontal White Stripes -->
    <g clip-path="url(#candyClip)">
      <!-- Stripe 1 -->
      <rect x="0" y="35" width="200" height="6" fill="#FFFFFF" opacity="0.85"/>
      <!-- Stripe 2 -->
      <rect x="0" y="50" width="200" height="6" fill="#FFFFFF" opacity="0.9"/>
      <!-- Stripe 3 -->
      <rect x="0" y="65" width="200" height="6" fill="#FFFFFF" opacity="0.85"/>
      <!-- Stripe 4 -->
      <rect x="0" y="80" width="200" height="6" fill="#FFFFFF" opacity="0.9"/>
      <!-- Stripe 5 -->
      <rect x="0" y="95" width="200" height="6" fill="#FFFFFF" opacity="0.85"/>
      <!-- Stripe 6 -->
      <rect x="0" y="110" width="200" height="6" fill="#FFFFFF" opacity="0.9"/>
      <!-- Stripe 7 -->
      <rect x="0" y="125" width="200" height="6" fill="#FFFFFF" opacity="0.85"/>
      <!-- Stripe 8 -->
      <rect x="0" y="140" width="200" height="6" fill="#FFFFFF" opacity="0.9"/>
      <!-- Stripe 9 -->
      <rect x="0" y="155" width="200" height="6" fill="#FFFFFF" opacity="0.8"/>
    </g>
    
    <!-- Top Glossy Reflection (over stripes) -->
    <ellipse cx="80" cy="60" rx="30" ry="18" 
             fill="url(#gloss)" 
             transform="rotate(-20, 80, 60)" />
    
    <!-- Specular Sparkle -->
    <circle cx="120" cy="50" r="4" fill="white" fill-opacity="0.9"/>
    <circle cx="123" cy="53" r="2" fill="white" fill-opacity="0.6"/>
  </g>
</svg>