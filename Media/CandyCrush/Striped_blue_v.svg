<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Candy Crush Style Blue Gradient -->
    <radialGradient id="blueGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#80D4FF"/>
      <stop offset="25%" stop-color="#4DB8FF"/>
      <stop offset="60%" stop-color="#0099FF"/>
      <stop offset="85%" stop-color="#0059B3"/>
      <stop offset="100%" stop-color="#003366"/>
    </radialGradient>
    
    <!-- Candy Crush Glossy Shine -->
    <radialGradient id="shine" cx="30%" cy="25%" r="45%">
      <stop offset="0%" stop-color="white" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Sugar Sparkle Gradient -->
    <radialGradient id="sparkle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Candy clip path for stripes -->
    <clipPath id="candyClip">
      <circle cx="100" cy="100" r="80"/>
    </clipPath>
  </defs>

  <!-- Main Round Candy Body -->
  <g>
    <!-- Candy shadow for depth -->
    <circle cx="100" cy="103" r="80" fill="rgba(0,0,0,0.12)"/>
    
    <!-- Main candy -->
    <circle cx="100" cy="100" r="80" 
            fill="url(#blueGrad)" 
            stroke="#002244" 
            stroke-width="2" />
    
    <!-- Vertical White Stripes -->
    <g clip-path="url(#candyClip)">
      <!-- Stripe 1 -->
      <rect x="35" y="0" width="7" height="200" fill="#FFFFFF" opacity="0.85"/>
      <!-- Stripe 2 -->
      <rect x="52" y="0" width="7" height="200" fill="#FFFFFF" opacity="0.9"/>
      <!-- Stripe 3 -->
      <rect x="69" y="0" width="7" height="200" fill="#FFFFFF" opacity="0.85"/>
      <!-- Stripe 4 -->
      <rect x="86" y="0" width="7" height="200" fill="#FFFFFF" opacity="0.9"/>
      <!-- Stripe 5 -->
      <rect x="103" y="0" width="7" height="200" fill="#FFFFFF" opacity="0.85"/>
      <!-- Stripe 6 -->
      <rect x="120" y="0" width="7" height="200" fill="#FFFFFF" opacity="0.9"/>
      <!-- Stripe 7 -->
      <rect x="137" y="0" width="7" height="200" fill="#FFFFFF" opacity="0.85"/>
      <!-- Stripe 8 -->
      <rect x="154" y="0" width="7" height="200" fill="#FFFFFF" opacity="0.8"/>
    </g>
    
    <!-- Glossy Shine Highlight -->
    <ellipse cx="72" cy="62" rx="38" ry="24" 
             fill="url(#shine)" 
             transform="rotate(-25, 72, 62)" />
    
    <!-- Secondary subtle shine -->
    <ellipse cx="140" cy="130" rx="20" ry="12" 
             fill="white" fill-opacity="0.08" 
             transform="rotate(-30, 140, 130)" />
    
    <!-- Candy Crush Style Sparkles -->
    <!-- Main sparkle -->
    <circle cx="125" cy="52" r="5" fill="url(#sparkle)"/>
    <circle cx="128" cy="55" r="2.5" fill="url(#sparkle)"/>
    
    <!-- Sugar crystal sparkles -->
    <circle cx="65" cy="130" r="2.5" fill="white" fill-opacity="0.6"/>
    <circle cx="145" cy="90" r="2" fill="white" fill-opacity="0.5"/>
    <circle cx="50" cy="85" r="1.5" fill="white" fill-opacity="0.4"/>
    <circle cx="155" cy="120" r="1.5" fill="white" fill-opacity="0.4"/>
    <circle cx="85" cy="155" r="2" fill="white" fill-opacity="0.3"/>
  </g>
</svg>