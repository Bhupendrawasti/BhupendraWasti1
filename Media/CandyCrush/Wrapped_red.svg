<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Candy wrapper body gradient - deep red to dark maroon (with transparency) -->
    <linearGradient id="wrapperGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E63946" stop-opacity="0.75"/>
      <stop offset="20%" stop-color="#D62828" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#B31B1B" stop-opacity="0.85"/>
      <stop offset="80%" stop-color="#8B0000" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#4A0000" stop-opacity="0.95"/>
    </linearGradient>

    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2C1810"/>
      <stop offset="100%" stop-color="#1A0F0A"/>
    </linearGradient>

    <!-- Left vertical gold ribbon gradient -->
    <linearGradient id="goldLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFF8DC"/>
      <stop offset="20%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#DAA520"/>
      <stop offset="80%" stop-color="#B8860B"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>

    <!-- Right vertical gold ribbon gradient -->
    <linearGradient id="goldRight" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FFF8DC"/>
      <stop offset="20%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#DAA520"/>
      <stop offset="80%" stop-color="#B8860B"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>

    <!-- Inner candy red gradient -->
    <radialGradient id="candyRedGrad" cx="35%" cy="35%" r="70%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#FF6666"/>
      <stop offset="25%" stop-color="#FF4444"/>
      <stop offset="60%" stop-color="#DD0000"/>
      <stop offset="85%" stop-color="#AA0000"/>
      <stop offset="100%" stop-color="#770000"/>
    </radialGradient>

    <!-- Candy shadow -->
    <filter id="candyShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="5" stdDeviation="4" flood-color="#330000" flood-opacity="0.5"/>
    </filter>

    <!-- Wrapper drop shadow -->
    <filter id="wrapperShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="4" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Dark premium background - fills entire canvas -->
  <rect x="0" y="0" width="500" height="500" fill="url(#bgGrad)"/>

  <!-- Main candy wrapper body -->
  <g filter="url(#wrapperShadow)">
    
    <!-- Wrapper base shape - with transparency -->
    <rect x="71" y="20" width="358" height="460" rx="20" ry="20" 
          fill="url(#wrapperGrad)" stroke="rgba(74,0,0,0.6)" stroke-width="3"/>

    <!-- Elegant gold outline border - inner -->
    <rect x="86" y="35" width="328" height="430" rx="15" ry="15" 
          fill="none" stroke="#FFD700" stroke-width="2" opacity="0.4"/>

    <!-- Second gold outline accent -->
    <rect x="94" y="43" width="312" height="414" rx="12" ry="12" 
          fill="none" stroke="#DAA520" stroke-width="1" opacity="0.25"/>

    <!-- ============================================ -->
    <!-- LEFT VERTICAL GOLD RIBBON - x=5 to x=70 -->
    <!-- ============================================ -->
    <g>
      <rect x="5" y="40" width="65" height="420" rx="6" fill="rgba(0,0,0,0.3)"/>
      <rect x="60" y="40" width="10" height="420" rx="4" fill="url(#goldLeft)" stroke="#8B6914" stroke-width="1"/>
      
      <path d="M 60,40 L 50,30 L 40,40 L 50,50 L 40,60 L 50,70 L 40,80 L 50,90 L 40,100 
               L 50,110 L 40,120 L 50,130 L 40,140 L 50,150 L 40,160 L 50,170 L 40,180 
               L 50,190 L 40,200 L 50,210 L 40,220 L 50,230 L 40,240 L 50,250 L 40,260 
               L 50,270 L 40,280 L 50,290 L 40,300 L 50,310 L 40,320 L 50,330 L 40,340 
               L 50,350 L 40,360 L 50,370 L 40,380 L 50,390 L 40,400 L 50,410 L 40,420 
               L 50,430 L 40,440 L 50,450 L 40,460 L 50,470 L 60,460 Z" 
            fill="url(#goldLeft)" stroke="#8B6914" stroke-width="1.5"/>
      
      <g stroke="rgba(255,255,255,0.35)" stroke-width="1" fill="none">
        <path d="M 50,30 L 40,40 L 50,50"/>
        <path d="M 50,70 L 40,80 L 50,90"/>
        <path d="M 50,110 L 40,120 L 50,130"/>
        <path d="M 50,150 L 40,160 L 50,170"/>
        <path d="M 50,190 L 40,200 L 50,210"/>
        <path d="M 50,230 L 40,240 L 50,250"/>
        <path d="M 50,270 L 40,280 L 50,290"/>
        <path d="M 50,310 L 40,320 L 50,330"/>
        <path d="M 50,350 L 40,360 L 50,370"/>
        <path d="M 50,390 L 40,400 L 50,410"/>
        <path d="M 50,430 L 40,440 L 50,450"/>
        <path d="M 50,470 L 60,460 L 50,450"/>
      </g>
      
      <rect x="55" y="40" width="4" height="420" fill="rgba(255,255,255,0.2)" rx="2"/>
      
      <g stroke="rgba(0,0,0,0.15)" stroke-width="0.8" fill="none">
        <line x1="40" y1="40" x2="40" y2="460"/>
        <line x1="50" y1="40" x2="50" y2="460"/>
      </g>
    </g>

    <!-- ============================================ -->
    <!-- RIGHT VERTICAL GOLD RIBBON - x=430 to x=495 -->
    <!-- ============================================ -->
    <g>
      <rect x="430" y="40" width="65" height="420" rx="6" fill="rgba(0,0,0,0.3)"/>
      <rect x="430" y="40" width="10" height="420" rx="4" fill="url(#goldRight)" stroke="#8B6914" stroke-width="1"/>
      
      <path d="M 440,40 L 450,30 L 460,40 L 450,50 L 460,60 L 450,70 L 460,80 L 450,90 L 460,100 
               L 450,110 L 460,120 L 450,130 L 460,140 L 450,150 L 460,160 L 450,170 L 460,180 
               L 450,190 L 460,200 L 450,210 L 460,220 L 450,230 L 460,240 L 450,250 L 460,260 
               L 450,270 L 460,280 L 450,290 L 460,300 L 450,310 L 460,320 L 450,330 L 460,340 
               L 450,350 L 460,360 L 450,370 L 460,380 L 450,390 L 460,400 L 450,410 L 460,420 
               L 450,430 L 460,440 L 450,450 L 460,460 L 450,470 L 440,460 Z" 
            fill="url(#goldRight)" stroke="#8B6914" stroke-width="1.5"/>
      
      <g stroke="rgba(255,255,255,0.35)" stroke-width="1" fill="none">
        <path d="M 450,30 L 460,40 L 450,50"/>
        <path d="M 450,70 L 460,80 L 450,90"/>
        <path d="M 450,110 L 460,120 L 450,130"/>
        <path d="M 450,150 L 460,160 L 450,170"/>
        <path d="M 450,190 L 460,200 L 450,210"/>
        <path d="M 450,230 L 460,240 L 450,250"/>
        <path d="M 450,270 L 460,280 L 450,290"/>
        <path d="M 450,310 L 460,320 L 450,330"/>
        <path d="M 450,350 L 460,360 L 450,370"/>
        <path d="M 450,390 L 460,400 L 450,410"/>
        <path d="M 450,430 L 460,440 L 450,450"/>
        <path d="M 450,470 L 440,460 L 450,450"/>
      </g>
      
      <rect x="441" y="40" width="4" height="420" fill="rgba(255,255,255,0.2)" rx="2"/>
      
      <g stroke="rgba(0,0,0,0.15)" stroke-width="0.8" fill="none">
        <line x1="450" y1="40" x2="450" y2="460"/>
        <line x1="460" y1="40" x2="460" y2="460"/>
      </g>
    </g>

    <!-- ============================================ -->
    <!-- CENTER RED KIDNEY BEAN CANDY -->
    <!-- ============================================ -->
    <g transform="translate(250, 250) rotate(-45) translate(-250, -250)" filter="url(#candyShadow)">
      <g transform="translate(250, 250) scale(0.55) translate(-250, -250)">
        
        <!-- Main bean body -->
        <path d="M275.5,300.3 
                 C260.3,259.9 274.7,210.5 308.9,184.4 
                 C385.6,149.7 380.8,88.7 367.6,57.2 
                 C356.8,31.6 322.5,-17.4 249.5,6.3 
                 C193.9,23 145.3,61.9 114.2,111.7 
                 C81.1,164.2 39.9,345 147.3,431 
                 C178.8,456.3 276.5,486.4 316.9,418.6 
                 C333.8,376.5 282.9,320.5 275.5,300.3z" 
              fill="url(#candyRedGrad)" 
              stroke="#550000" 
              stroke-width="3.5" />

        <!-- Soft glossy highlight -->
        <path d="M180,120 
                 Q215,75 275,95 
                 Q310,108 320,145 
                 Q315,115 280,100 
                 Q230,85 190,115 
                 Z" 
              fill="white" 
              fill-opacity="0.45" />
              
        <!-- Additional small highlight -->
        <ellipse cx="220" cy="140" rx="15" ry="8" fill="white" fill-opacity="0.25" transform="rotate(-30, 220, 140)"/>
        
        <!-- Tiny sparkle on candy -->
        <circle cx="250" cy="120" r="4" fill="white" fill-opacity="0.8"/>
        <circle cx="253" cy="123" r="2" fill="white" fill-opacity="0.5"/>
        
        <!-- Sugar crystal sparkles -->
        <circle cx="190" cy="200" r="2" fill="white" fill-opacity="0.4"/>
        <circle cx="310" cy="190" r="1.5" fill="white" fill-opacity="0.35"/>
      </g>
    </g>

    <!-- ============================================ -->
    <!-- ADDITIONAL DETAILS -->
    <!-- ============================================ -->
    
    <!-- Subtle wrapper texture lines -->
    <g opacity="0.03">
      <line x1="120" y1="200" x2="120" y2="330" stroke="#000" stroke-width="1"/>
      <line x1="180" y1="200" x2="180" y2="330" stroke="#000" stroke-width="1"/>
      <line x1="320" y1="200" x2="320" y2="330" stroke="#000" stroke-width="1"/>
      <line x1="380" y1="200" x2="380" y2="330" stroke="#000" stroke-width="1"/>
    </g>

    <!-- Top edge shine -->
    <rect x="73" y="22" width="354" height="5" rx="2.5" fill="rgba(255,255,255,0.1)"/>

    <!-- Bottom edge shadow -->
    <rect x="73" y="475" width="354" height="5" rx="2.5" fill="rgba(0,0,0,0.25)"/>

  </g>

  <!-- Premium corner accents -->
  <g fill="none" stroke="#FFD700" stroke-width="2" opacity="0.4">
    <path d="M 5,20 L 5,5 L 20,5"/>
    <path d="M 495,20 L 495,5 L 480,5"/>
    <path d="M 5,480 L 5,495 L 20,495"/>
    <path d="M 495,480 L 495,495 L 480,495"/>
  </g>
</svg>